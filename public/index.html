<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#08080c">
  <title>Chat with May</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Auth screen -->
  <div id="auth-screen">
    <div id="auth-box">
      <div class="auth-orb"></div>
      <h1>Chat with May</h1>

      <!-- Login view -->
      <div id="auth-login">
        <p>請輸入通行碼</p>
        <div id="auth-input-row">
          <input id="auth-input" type="password" placeholder="通行碼" autocomplete="off" />
          <button id="auth-btn">→</button>
        </div>
        <button id="biometric-btn" class="hidden" aria-label="指紋解鎖">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 15-6.7"/>
            <path d="M21 12a9 9 0 0 1-15 6.7"/>
            <path d="M7 12a5 5 0 0 1 8.5-3.5"/>
            <path d="M17 12a5 5 0 0 1-8.5 3.5"/>
            <path d="M10 12a2 2 0 0 1 4 0"/>
            <path d="M14 12a2 2 0 0 1-4 0"/>
            <line x1="12" y1="12" x2="12" y2="16"/>
          </svg>
          <span>指紋 / Face ID</span>
        </button>
        <p id="auth-error"></p>
        <p class="auth-switch">沒有帳號？<a href="#" id="show-register">申請使用</a></p>
      </div>

      <!-- Register view -->
      <div id="auth-register" class="hidden">
        <p>申請使用 Chat with May</p>
        <input id="reg-name" type="text" placeholder="你的名字" autocomplete="name" />
        <input id="reg-email" type="email" placeholder="Email" autocomplete="email" />
        <button id="reg-btn">送出申請</button>
        <p id="reg-status"></p>
        <p class="auth-switch">已有通行碼？<a href="#" id="show-login">登入</a></p>
      </div>

      <!-- Pending view -->
      <div id="auth-pending" class="hidden">
        <p>⏳</p>
        <p>申請已送出</p>
        <p class="auth-sub">管理員審核通過後，你會收到 Email 通知。</p>
      </div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div id="status-bar">
      <div id="status-indicator"></div>
      <span id="status-text">INITIALIZING</span>
    </div>

    <div id="visual-area">
      <div id="orb-container">
        <div id="orb" class="idle">
          <div class="orb-ring ring-1"></div>
          <div class="orb-ring ring-2"></div>
          <div class="orb-ring ring-3"></div>
          <div class="orb-core"></div>
        </div>
      </div>
      <p id="transcript"></p>

      <!-- TTS controls (hidden until there's a reply) -->
      <div id="tts-controls" class="hidden">
        <div id="tts-buttons">
          <button id="stop-btn" aria-label="停止語音" title="停止">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
          <button id="replay-btn" aria-label="重播" title="重播">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
          </button>
        </div>
        <div id="speed-control">
          <span id="speed-label">1x</span>
          <input id="speed-slider" type="range" min="0" max="6" step="1" value="2" />
        </div>
      </div>
    </div>

    <div id="controls">
      <div id="input-row">
        <input id="text-input" type="text" placeholder="輸入訊息…" autocomplete="off" />
        <button id="send-btn" aria-label="送出">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
      <div id="mic-row">
        <button id="mic-btn" aria-label="開始對話">
          <svg id="mic-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3" />
            <path d="M5 11a7 7 0 0 0 14 0" />
            <line x1="12" y1="19" x2="12" y2="22" />
            <line x1="9" y1="22" x2="15" y2="22" />
          </svg>
        </button>
        <span id="hint-text">TAP TO SPEAK</span>
      </div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
